# Single source of truth for the toolchain that scripts/build-wasm.sh needs.
# The wasm bundle is pure Rust end-to-end (the CSG kernel is the in-tree
# exact mesh-arrangement kernel — the Manifold C++ kernel and its LLVM-20 /
# libc++ wasm cross-toolchain were removed at M9, see
# docs/architecture/pure-rust-csg-kernel.md), so this is just the pinned
# Rust nightly + wasm-pack + the cargo cache.
#
# Used by test.yml, release.yml and sdk-canary.yml so the three stay in
# lock-step — a toolchain change here updates all of them at once, instead of
# one drifting (which is how sdk-canary once shipped without a toolchain
# piece and went red on an unrelated PR).
name: 'Setup WASM build toolchain'
description: 'Rust (rust-toolchain.toml) + wasm-pack for the wasm32 build'

inputs:
  cache-prefix:
    description: 'Swatinem/rust-cache prefix-key, to namespace the cargo cache per workflow'
    required: true

runs:
  using: composite
  steps:
    # rust-toolchain.toml pins the nightly + wasm32-unknown-unknown + rust-src;
    # `rustup show` triggers install of exactly that toolchain.
    - name: Setup Rust (pinned by rust-toolchain.toml)
      shell: bash
      run: rustup show

    - name: Cargo cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        prefix-key: ${{ inputs.cache-prefix }}

    - name: Install wasm-pack
      uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      with:
        # Pinned, not `latest`: `latest` makes the action hit the GitHub releases
        # API on every run to resolve the newest version, which intermittently
        # returns an HTML rate-limit page instead of JSON ("Unexpected token '<'")
        # and fails the WASM build for reasons unrelated to the change under test.
        # A fixed version is reproducible and skips the lookup entirely.
        version: v0.15.0
