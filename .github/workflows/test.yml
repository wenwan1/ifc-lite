name: Test

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

# Force JavaScript actions onto Node 24. GitHub deprecated Node 20 for
# actions in late 2025 and will flip the default in June 2026. Setting
# this opts us in early so the deprecation warning doesn't show up on
# every run, and it covers actions like jetli/wasm-pack-action that
# haven't shipped a Node-24-native release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Path filter — emits booleans the downstream jobs use as `if:` gates.
  # Doc-only and non-test changes skip every expensive job below.
  changes:
    name: Detect changes
    runs-on: depot-ubuntu-24.04
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
      geometry: ${{ steps.filter.outputs.geometry }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            rust:
              - 'rust/**'
              - 'apps/server/**'
              - 'apps/desktop/src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'scripts/build-wasm.sh'
              - 'tests/models/manifest.json'
              - '.github/workflows/test.yml'
            frontend:
              - 'apps/viewer/**'
              - 'apps/desktop/**'
              - 'apps/viewer-embed/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig*.json'
              - 'scripts/**'
              - 'tests/models/manifest.json'
              - '.github/workflows/test.yml'
            geometry:
              - 'rust/geometry/**'
              - 'rust/processing/**'
              - 'apps/server/Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/test.yml'

  # Shared install + WASM + workspace build. Uploads built dist/ for the
  # downstream JS jobs; Rust jobs do their own checkout + cargo cache
  # restore (Swatinem) and don't need this artifact.
  build:
    name: Build packages + WASM
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: depot-ubuntu-24.04-4
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fixtures live in a GitHub Release (see tests/models/manifest.json
          # and AGENTS.md §9). The repo no longer uses Git LFS — explicitly
          # disable the smudge filter so a stray .gitattributes can't
          # reintroduce it on a contributor branch.
          lfs: false
          persist-credentials: false

      - name: Setup pnpm
        # v6 reads the version from the `packageManager` field in
        # package.json (`pnpm@10.8.1`); specifying `with.version` here
        # would conflict and the action errors with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      # rust-toolchain.toml pins nightly-2025-11-15 with wasm32-unknown-unknown
      # + rust-src. `rustup show` triggers install of exactly that toolchain.
      - name: Setup Rust (pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: ci-build

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the fetched fixture tree keyed on the manifest hash. ~994 MiB.
      # Cache hit = no network. Cache miss (manifest changed) = one cold pull
      # from the GitHub Release CDN. Pattern documented in AGENTS.md §9.
      - name: Cache test fixtures
        id: fixtures-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/models
          # Namespace cache key separately from `release.yml` (`release-fixtures-…`).
          # Phase A hardening — keeps the privileged release runner from ever
          # reading a cache writeable by a fork-triggered job.
          key: ci-fixtures-${{ runner.os }}-${{ hashFiles('tests/models/manifest.json') }}

      - name: Fetch fixtures
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        run: pnpm fixtures

      - name: Verify fixtures
        run: pnpm fixtures:check

      # Rebuild the wasm bindings from rust/wasm-bindings/ on every run.
      # packages/wasm/pkg/ is committed but goes stale whenever Rust changes
      # ship without a maintainer running scripts/build-wasm.sh first; this
      # step catches Rust → wasm breakage before downstream consumers see it.
      - name: Build WASM
        run: bash scripts/build-wasm.sh

      # Build all workspace packages so their dist/ artifacts exist for
      # downstream consumers — turbo handles the dep graph.
      - name: Build packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          # `packages/*/pkg` covers both `wasm/pkg` and `wasm-threaded/pkg`
          # which downstream `pnpm build` calls require (see
          # @ifc-lite/wasm-threaded#build's pre-built-artifact check).
          path: |
            packages/*/dist
            packages/*/wasm
            packages/*/pkg
          retention-days: 1
          if-no-files-found: error

  typecheck:
    name: Typecheck
    needs: [changes, build]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: depot-ubuntu-24.04-4
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: false
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: build-output
          path: packages
      - run: pnpm typecheck

  lint:
    name: Lint
    needs: [changes, build]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: false
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # lint runs against source; doesn't need built dist.
      - run: pnpm lint

  node-tests:
    name: Node tests
    needs: [changes, build]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.rust == 'true'
    runs-on: depot-ubuntu-24.04-4
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: false
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: build-output
          path: packages
      - name: Cache test fixtures
        id: fixtures-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/models
          key: ci-fixtures-${{ runner.os }}-${{ hashFiles('tests/models/manifest.json') }}
      - name: Fetch fixtures
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        run: pnpm fixtures
      - run: pnpm test

  rust-tests:
    name: Rust tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: depot-ubuntu-24.04-8
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: false
          persist-credentials: false
      - name: Setup Rust (pinned by rust-toolchain.toml)
        run: rustup show
      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: ci-rust
      - name: Cache test fixtures
        id: fixtures-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/models
          key: ci-fixtures-${{ runner.os }}-${{ hashFiles('tests/models/manifest.json') }}
      - name: Fetch fixtures
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        # The fixtures script is pure Node (no npm deps) so we skip the
        # pnpm install dance Rust-only jobs don't need.
        run: node scripts/fixtures/fetch-fixtures.mjs
      # Workspace exclusions:
      #   - ifc-lite-wasm: dev-deps on wasm-bindgen-test; tests target wasm32.
      #   - ifc-lite-desktop: Tauri crate needs gtk/webkit2gtk system libs;
      #     desktop-compat.yml validates the desktop frontend separately.
      - name: Rust tests
        run: cargo test --workspace --exclude ifc-lite-wasm --exclude ifc-lite-desktop

  # Validates the Manifold CSG kernel path (T1.1 +). Only runs when files
  # that affect the kernel actually changed — first run on a runner
  # compiles `manifold-csg-sys` (Manifold + Clipper2 via cmake) which adds
  # ~60 s; subsequent runs hit the rust-cache.
  #
  # Sprint 2 acceptance gates
  # (`issue_582_fzk_haus_no_csg_failures_after_manifold` and
  # `issue_583_institute_var2_no_csg_failures_after_manifold`) only exist
  # under this feature and assert `total_failures == 0` on the
  # ara3d AC20-FZK-Haus.ifc and C20-Institute-Var-2.ifc fixtures.
  #
  # `wasm32-unknown-unknown` builds intentionally don't enable
  # `manifold-csg`: the upstream `manifold-csg-sys` wasm-cxx-shim is
  # currently incompatible with libc++-{18,20} (see
  # docs/architecture/geometry-pipeline.md "WASM status"). Until that
  # is resolved upstream, the WASM bundle continues to use the
  # legacy BSP CSG path.
  manifold-tests:
    name: Rust tests (Manifold CSG kernel)
    needs: changes
    if: needs.changes.outputs.geometry == 'true'
    runs-on: depot-ubuntu-24.04-8
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: false
          persist-credentials: false
      - name: Setup Rust (pinned by rust-toolchain.toml)
        run: rustup show
      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: ci-manifold
      - name: Cache test fixtures
        id: fixtures-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/models
          key: ci-fixtures-${{ runner.os }}-${{ hashFiles('tests/models/manifest.json') }}
      - name: Fetch fixtures
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        run: |
          npm i -g pnpm@10.8.1
          pnpm fixtures
      - name: Manifold CSG tests
        run: cargo test -p ifc-lite-geometry --features manifold-csg

  # Aggregate gate. Keeps the existing required status check name green
  # for the branch protection rule so we don't have to retouch settings.
  # Succeeds if every dependency succeeded or was skipped (path-filtered
  # out); fails the moment any dependency fails or is cancelled.
  test:
    name: Build + WASM + Rust + Node
    needs: [changes, build, typecheck, lint, node-tests, rust-tests, manifold-tests]
    if: always()
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Gate on dependencies
        run: |
          declare -A results=(
            [build]="${{ needs.build.result }}"
            [typecheck]="${{ needs.typecheck.result }}"
            [lint]="${{ needs.lint.result }}"
            [node-tests]="${{ needs.node-tests.result }}"
            [rust-tests]="${{ needs.rust-tests.result }}"
            [manifold-tests]="${{ needs.manifold-tests.result }}"
          )
          fail=0
          for j in "${!results[@]}"; do
            r="${results[$j]}"
            echo "  $j: $r"
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          exit $fail
